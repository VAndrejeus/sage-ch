<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAGE-CH Agent / Discovery</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>SAGE-CH</h1>
        <p class="subtitle">Agent / Discovery Local Web App</p>
      </div>
      <div id="job-banner" class="status-badge idle">Idle</div>
    </header>

    <nav class="tabs">
      <button class="tab-button active" data-tab="agent-panel">Agent</button>
      <button class="tab-button" data-tab="scope-panel">Discovery Scope</button>
      <button class="tab-button" data-tab="run-panel">Discovery Run</button>
      <button class="tab-button" data-tab="outputs-panel">Outputs</button>
    </nav>

    <main class="panels">
      <section id="agent-panel" class="panel active">
        <div class="card">
          <h2>Agent</h2>

          <div class="field-grid">
            <div class="field">
              <label>Detected OS</label>
              <div id="detected-os" class="readonly-box">Loading...</div>
            </div>

            <div class="field">
              <label for="agent-type">Agent Type</label>
              <select id="agent-type"></select>
            </div>

            <div class="field">
              <label for="agent-output-dir">Output Folder</label>
              <input id="agent-output-dir" type="text" value="outputs" />
            </div>
          </div>

          <div class="actions">
            <button id="run-agent-btn">Run Agent</button>
          </div>
        </div>
      </section>

      <section id="scope-panel" class="panel">
        <div class="card">
          <h2>Discovery Scope</h2>

          <div class="field">
            <label for="authorized-networks">Authorized Networks</label>
            <input id="authorized-networks" type="text" placeholder="Example: *, 192.168.1.0/24" />
            <div class="hint">Comma-separated</div>
          </div>

          <div class="field">
            <label for="authorized-interfaces">Authorized Interfaces</label>
            <input id="authorized-interfaces" type="text" placeholder="Example: *, eth0, wlan0" />
            <div class="hint">Comma-separated</div>
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="max-hosts-per-subnet">Max Hosts Per Subnet</label>
              <input id="max-hosts-per-subnet" type="number" min="1" />
            </div>

            <div class="field checkbox-field">
              <label class="checkbox-label">
                <input id="private-only" type="checkbox" />
                Private only
              </label>
            </div>
          </div>

          <div class="actions">
            <button id="save-scope-btn">Save Scope</button>
            <span id="scope-save-message" class="inline-message"></span>
          </div>
        </div>
      </section>

      <section id="run-panel" class="panel">
        <div class="card">
          <h2>Discovery Run</h2>
          <p class="muted">
            Discovery always uses the saved file:
            <code>config/discovery_scope.json</code>
          </p>

          <div class="field">
            <label for="discovery-output-dir">Output Folder</label>
            <input id="discovery-output-dir" type="text" value="outputs" />
          </div>

          <div class="actions">
            <button id="run-discovery-btn">Run Discovery</button>
          </div>
        </div>

        <div class="card">
          <h2>Job Status</h2>

          <div class="status-grid">
            <div>
              <div class="status-label">Job Type</div>
              <div id="job-type">—</div>
            </div>
            <div>
              <div class="status-label">Status</div>
              <div id="job-status-text">idle</div>
            </div>
            <div>
              <div class="status-label">Started</div>
              <div id="job-started-at">—</div>
            </div>
            <div>
              <div class="status-label">Finished</div>
              <div id="job-finished-at">—</div>
            </div>
          </div>

          <div class="field">
            <label>Output Path</label>
            <div id="job-output-path" class="readonly-box">—</div>
          </div>

          <div class="field">
            <label>Error</label>
            <div id="job-error-message" class="readonly-box">—</div>
          </div>

          <div class="field">
            <label>Logs</label>
            <pre id="job-logs" class="log-box">No logs yet.</pre>
          </div>
        </div>
      </section>

  <section id="outputs-panel" class="panel">
  <div class="card">
    <div class="section-header">
      <h2>Outputs</h2>

      <div style="display:flex; gap:10px; align-items:center;">
        <select id="output-filter">
          <option value="all">All</option>
          <option value="agent">Agent</option>
          <option value="collector">Collector</option>
        </select>

        <button id="refresh-outputs-btn">Refresh</button>
      </div>
    </div>

    <div id="outputs-message" class="muted"></div>
    <div id="outputs-list" class="outputs-list"></div>
  </div>
      </section>
    </main>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
